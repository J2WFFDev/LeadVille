# hostapd configuration for LeadVille Bridge AP mode
# Location: /etc/hostapd/leadville.conf

interface=wlan0
driver=nl80211
ssid=LeadVille-Bridge
hw_mode=g
channel=7
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=leadville2024
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP